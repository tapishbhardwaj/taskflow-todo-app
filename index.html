<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Organize Your Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>📋 TaskFlow</h1>
            <p>Stay organized and boost your productivity.</p>
        </div>

        <div class="todo-app">

            <div class="add-task">

                <input
                    type="text"
                    id="todo-input"
                    placeholder="Enter a new task..."
                >

                <button id="add-btn">
                    Add
                </button>

            </div>

            <div class="search-box">

                <input
                    type="text"
                    id="search-input"
                    placeholder="Search tasks..."
                >

            </div>

            <div class="task-info">

                <p id="task-count">
                    Total : 0
                </p>

                <p id="remaining-count">
                    Remaining : 0
                </p>

                <p id="completed-count">
    Completed : 0
</p>

            </div>

            <div class="filters">

                <button
                    class="filter-btn active"
                    data-filter="all">

                    All

                </button>

                <button
                    class="filter-btn"
                    data-filter="active">

                    Active

                </button>

                <button
                    class="filter-btn"
                    data-filter="completed">

                    Completed

                </button>

            </div>


            <div id="empty-message" class="empty-state">

                <h3>No Tasks Yet 😴</h3>

                <p>Add your first task to get started.</p>

            </div>


            <ul id="task-list">

            </ul>


            <button id="delete-all">

                Delete All

            </button>

        </div>

        <footer>

            Made with by Tapish Bhardwaj

        </footer>

    </div>

    <script src="script.js"></script>

</body>
</html>
